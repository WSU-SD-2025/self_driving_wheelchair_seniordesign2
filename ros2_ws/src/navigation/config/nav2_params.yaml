    odom_topic: /wheel/odom
    bt_loop_duration: 100
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: "/home/sejunmoon/self_driving_wheelchair/ros2_ws/src/navigation/config/nav_to_pose_no_spin_backup.xml"
    default_nav_through_poses_bt_xml: "/home/sejunmoon/self_driving_wheelchair/ros2_ws/src/navigation/config/nav_to_pose_no_spin_backup.xml"

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
