      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 10.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.015
      movement_time_allowance: 90.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 3.14
      stateful: True

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.30
      min_approach_linear_velocity: 0.15
      approach_velocity_scaling_dist: 0.6

      lookahead_dist: 2.0
      min_lookahead_dist: 1.2
      max_lookahead_dist: 2.5
      lookahead_time: 2.5
      use_velocity_scaled_lookahead_dist: false

      use_rotate_to_heading: false
      allow_reversing: false

      rotate_to_heading_angular_vel: 0.25
      max_angular_accel: 0.35

      use_collision_detection: True
      max_allowed_time_to_collision_up_to_carrot: 1.5

      transform_tolerance: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[ [0.4035, 0.3275], [0.4035, -0.3275], [-0.4035, -0.3275], [-0.4035, 0.3275]]"
      footprint_padding: 0.0
      footprint_clearing_enabled: True
      plugins: ["obstacle_layer", "denoise_layer", "inflation_layer"]

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        group_connectivity_type: 8
        minimal_group_size: 2

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /ldlidar_node/scan
          data_type: LaserScan
          marking: True
          clearing: True
          obstacle_min_range: 0.20
          raytrace_min_range: 0.20
          obstacle_range: 5.0
          raytrace_range: 7.0
          max_obstacle_height: 1.0
          inf_is_valid: True
          observation_persistence: 0.0
          expected_update_rate: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.338

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 10
      height: 10
      origin_x: 0.0
      origin_y: 0.0
      footprint: "[ [0.4035, 0.3275], [0.4035, -0.3275], [-0.4035, -0.3275], [-0.4035, 0.3275]]"
      footprint_padding: 0.0
      footprint_clearing_enabled: True
      resolution: 0.05
      track_unknown_space: true
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /ldlidar_node/scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          obstacle_min_range: 0.20
          raytrace_min_range: 0.20
          obstacle_range: 10.0
          raytrace_range: 12.0
          max_obstacle_height: 1.0
          inf_is_valid: True
          observation_persistence: 0.0
          expected_update_rate: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.338

      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: False
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.7
      use_astar: true
      allow_unknown: true
      cost_travel_multiplier: 4.0

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["drive_on_heading", "assisted_teleop", "wait"]

    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"

    wait:
      plugin: "nav2_behaviors/Wait"

    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.35
    min_rotational_vel: 0.00
    rotational_acc_lim: 0.4
    max_translational_vel: 0.50
    translational_acc_lim: 0.6
    translational_decel_lim: 0.6

robot_state_publisher:
  ros__parameters:
    use_sim_time: False
    publish_frequency: 50.0

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"

    max_velocity: [0.50, 0.0, 0.40]
    min_velocity: [0.0, 0.0, -0.40]

    max_accel: [0.50, 0.0, 0.40]
    max_decel: [-0.50, 0.0, -0.40]

    odom_topic: "/wheel/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: False
    enabled: False
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    transform_tolerance: 0.5
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    use_stamped_cmd_vel: False
    cmd_vel_in: "/cmd_vel/smooth"
    cmd_vel_out: "/cmd_vel"
    cmd_vel_in_topic: "/cmd_vel/smooth"
    cmd_vel_out_topic: "/cmd_vel"
    polygons: ["PolygonStop", "PolygonSlow"]

    PolygonSlow:
      type: "polygon"
      points: [0.5535, 0.4775, 0.5535, -0.4775, -0.5535, -0.4775, -0.5535, 0.4775]
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.10
      visualize: True
      polygon_pub_topic: "polygon_slowdown"

    PolygonStop:
      type: "polygon"
      points: [0.4535, 0.3775, 0.4535, -0.3775, -0.4535, -0.3775, 0.4535, 0.3775]
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"

    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: "/ldlidar_node/scan"

lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names: ['ldlidar_node', 'controller_server', 'smoother_server', 'planner_server', 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother']
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
    introspection_mode: "disabled"
